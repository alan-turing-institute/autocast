# @package _global_
defaults:
  - /distributed: ddp_4gpu_slurm
  - override /datamodule: gray_scott
  - override /model: autoencoder_dc_large
  - override /optimizer: psgd
  - _self_

experiment_name: ae_dc_large_gray_scott

datamodule:
  use_normalization: true
  batch_size: 64

model:
  encoder:
    periodic: true
  decoder:
    periodic: true

logging:
  wandb:
    enabled: true

optimizer:
  learning_rate: 1e-5
  weight_decay: 0.0
  scheduler: cosine

trainer:
  gradient_clip_val: 1.0
