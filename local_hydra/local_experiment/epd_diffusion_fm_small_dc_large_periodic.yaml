# @package _global_
defaults:
  - override /datamodule: advection_diffusion_multichannel_64_64
  - override /encoder@model.encoder: dc_large
  - override /decoder@model.decoder: dc_large
  - override /processor@model.processor: flow_matching_vit
  - override /backbone@model.processor.backbone: vit
  - override /hydra/launcher: slurm
  - _self_

experiment_name: epd_diffusion_fm_small_periodic

datamodule:
  use_normalization: true
  batch_size: 256

model:
  encoder:
    periodic: true
  decoder:
    periodic: true
  train_in_latent_space: true
  processor:
    backbone:
      # hid_channels: 256 ~ 19 M
      # hid_channels: 512 ~ 58.5 M
      #  ~ 90 M
      # hid_channels: 640
      # hid_channels: 1024 ~  217 M
      # Small
      attention_heads: 4
      hid_blocks: 8
      hid_channels: 128
    flow_ode_steps: 50

logging:
  wandb:
    enabled: true

optimizer:
  learning_rate: 0.0002

trainer:
  max_time: "00:12:00:00"
  accelerator: gpu
  devices: 4
  strategy: ddp
  num_nodes: 1

hydra:
  launcher:
    gpus_per_node: 4
    tasks_per_node: 4