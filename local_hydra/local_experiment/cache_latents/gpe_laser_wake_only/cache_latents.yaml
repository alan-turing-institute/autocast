# @package _global_
defaults:
  - /distributed: single_gpu_slurm
  - override /datamodule: gpe_laser_only_wake
  - override /encoder@model.encoder: dc_large
  - override /decoder@model.decoder: dc_large
  - _self_

experiment_name: cache_latents_gpe_laser_only_wake

# Must match the AE training config (ae/gpe_laser_wake_only/ae_dc_large.yaml)
# so encoder/decoder architectures align with the checkpoint weights.
model:
  encoder:
    periodic: false
    pixel_shuffle: true
  decoder:
    periodic: false
    pixel_shuffle: true
