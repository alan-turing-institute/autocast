# @package _global_
defaults:
  - /distributed: ddp_4gpu_slurm
  - override /datamodule: miniwell
  - override /processor@model.processor: flow_matching_vit
  - override /backbone@model.processor.backbone: vit_small
  - override /optimizer: adamw_half
  - _self_

experiment_name: the_well_rayleigh_benard_fm_vit_small

datamodule:
  data_path: ${oc.env:AUTOCAST_DATASETS,./datasets}/rayleigh_benard/1e3z5x2c_rayleigh_benard_dcae_f32c64_large/cache/rayleigh_benard
  n_steps_input: 1
  n_steps_output: 4
  stride: 1
  batch_size: 256
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

float32_matmul_precision: high

logging:
  wandb:
    enabled: true

output:
  skip_test: true

trainer:
  max_time: "00:23:59:00"

optimizer:
  learning_rate: 1e-4
  warmup: 0

model:
  processor:
    flow_ode_steps: 50
    backbone:
      mod_features: 256
      hid_channels: 512
      hid_blocks: 16
      ffn_factor: 4
      attention_heads: 4
      patch_size: 1
      dropout: 0.05
      checkpointing: false
  val_metrics: []
