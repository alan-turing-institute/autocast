# @package _global_
defaults:
  - /distributed: ddp_4gpu_slurm
  - override /datamodule: the_well
  - override /encoder@model.encoder: permute_concat
  - override /decoder@model.decoder: channels_last
  - override /processor@model.processor: vit_azula_large
  - override /optimizer: adamw_half
  - _self_

experiment_name: the_well_rayleigh_benard_crps_vit_azula_large_ambient

# CRPS directly in ambient Rayleigh-Benard space, matching the raw-space EPD
# setup used by the other comparison datasets.
datamodule:
  well_dataset_name: rayleigh_benard
  well_base_path: ${oc.env:AUTOCAST_DATASETS,./datasets}
  n_steps_input: 1
  n_steps_output: 4
  min_dt_stride: 1
  max_dt_stride: 1
  batch_size: 32
  num_workers: 8
  use_normalization: true
  normalization_path: ${oc.env:AUTOCAST_DATASETS,./datasets}/rayleigh_benard/stats.yaml
  autoencoder_mode: false
  max_rollout_steps: 100
  flatten_tensors: true
  cache_small: true
  max_cache_size: 1.0e9
  return_grid: true
  boundary_return_type: padding

float32_matmul_precision: high

logging:
  wandb:
    enabled: true

output:
  skip_test: true

optimizer:
  learning_rate: 2e-4
  warmup: 0

model:
  train_in_latent_space: false
  n_members: 8
  encoder:
    with_constants: true
  processor:
    # Raw RB is 512x128, so patch_size=32 gives the same 16x4 token grid as
    # LoLA latent patch_size=1. hidden_dim=864, n_layers=16 keeps the trainable
    # processor close to the ~220M LoLA-scale budget.
    hidden_dim: 864
    num_heads: 8
    n_layers: 16
    patch_size: 32
    n_noise_channels: 1024
    global_cond_channels: auto
    include_global_cond: true
  loss_func:
    _target_: autocast.losses.ensemble.AlphaFairCRPSLoss
  train_metrics:
    afcrps:
      _target_: autocast.metrics.ensemble.AlphaFairCRPS
    afcrps_mae_term:
      _target_: autocast.metrics.ensemble.AlphaFairCRPSMAETerm
    afcrps_spread_term:
      _target_: autocast.metrics.ensemble.AlphaFairCRPSSpreadTerm
  val_metrics:
    afcrps:
      _target_: autocast.metrics.ensemble.AlphaFairCRPS
    afcrps_mae_term:
      _target_: autocast.metrics.ensemble.AlphaFairCRPSMAETerm
    afcrps_spread_term:
      _target_: autocast.metrics.ensemble.AlphaFairCRPSSpreadTerm
    spread:
      _target_: autocast.metrics.ensemble.EnsembleSpread
    multicoverage:
      _target_: autocast.metrics.MultiCoverage
    multiwinkler:
      _target_: autocast.metrics.ensemble.MultiWinkler
