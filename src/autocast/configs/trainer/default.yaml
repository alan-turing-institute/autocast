_target_: lightning.pytorch.trainer.trainer.Trainer
max_time: "00:12:00:00" # Hours or datetime string, e.g. "2024-12-31 23:59:59"
accelerator: auto
strategy: auto
num_nodes: 1
devices: 1
log_every_n_steps: 10
enable_checkpointing: true
detect_anomaly: false
default_root_dir: null
gradient_clip_val: null

# Save snapshots throughout training based on optimizer-step progress.
# Override at runtime, e.g.:
#   trainer.callbacks.0.every_n_train_steps_fraction=0.1
#   trainer.callbacks.0.every_n_train_steps=500
callbacks:
  # Progress snapshots every ~5% of optimizer steps. Keeping all of them makes
  # it practical to inspect how calibration evolves across the run.
  - _target_: autocast.callbacks.checkpoint.ProgressModelCheckpoint
    save_top_k: -1
    every_n_train_steps_fraction: 0.05
    save_last: true
    filename: "snapshot-{progress_token}-{epoch:04d}-{step:08d}"
    auto_insert_metric_name: false
  # Best checkpoint on the primary validation objective.
  - _target_: lightning.pytorch.callbacks.ModelCheckpoint
    monitor: val_loss
    mode: min
    save_top_k: 1
    save_last: false  # rolling callback above owns last.ckpt
    filename: "best-val-{epoch:04d}-{val_loss:.4f}"
    auto_insert_metric_name: false
  # Optional coverage checkpoint for early phase (<= 0.25). Stops updating after
  # the burn-in cutoff.
  - _target_: autocast.callbacks.checkpoint.ProgressModelCheckpoint
    monitor: val_multicoverage
    monitor_optional: true
    stop_after_fraction: 0.25
    mode: min
    save_top_k: 1
    save_last: false
    filename: "best-multicov-pre0p25-{epoch:04d}-{val_multicoverage:.4f}"
    auto_insert_metric_name: false
  # Optional interval-score checkpoint for early phase (<= 0.25). Stops updating
  # after the burn-in cutoff.
  - _target_: autocast.callbacks.checkpoint.ProgressModelCheckpoint
    monitor: val_multiwinkler
    monitor_optional: true
    stop_after_fraction: 0.25
    mode: min
    save_top_k: 1
    save_last: false
    filename: "best-multiwinkler-pre0p25-{epoch:04d}-{val_multiwinkler:.4f}"
    auto_insert_metric_name: false
  # Optional coverage-oriented checkpoint. This stays dormant unless the model
  # logs `val_multicoverage`, and only starts tracking once training is half done
  # to avoid anchoring on the noisy early phase.
  - _target_: autocast.callbacks.checkpoint.ProgressModelCheckpoint
    monitor: val_multicoverage
    monitor_optional: true
    start_after_fraction: 0.25
    mode: min
    save_top_k: 1
    save_last: false
    filename: "best-multicov-from0p25-{epoch:04d}-{val_multicoverage:.4f}"
    auto_insert_metric_name: false
  # Optional coverage checkpoint for later phase (>= 0.50).
  - _target_: autocast.callbacks.checkpoint.ProgressModelCheckpoint
    monitor: val_multicoverage
    monitor_optional: true
    start_after_fraction: 0.5
    mode: min
    save_top_k: 1
    save_last: false
    filename: "best-multicov-from0p50-{epoch:04d}-{val_multicoverage:.4f}"
    auto_insert_metric_name: false
  # Optional coverage checkpoint for very-late phase (>= 0.75).
  - _target_: autocast.callbacks.checkpoint.ProgressModelCheckpoint
    monitor: val_multicoverage
    monitor_optional: true
    start_after_fraction: 0.75
    mode: min
    save_top_k: 1
    save_last: false
    filename: "best-multicov-from0p75-{epoch:04d}-{val_multicoverage:.4f}"
    auto_insert_metric_name: false
  # Optional interval-score checkpoint. MultiWinkler rewards sharper intervals
  # but penalizes misses across a grid of central coverage levels, so it is a
  # calibration-aware alternative to raw coverage error for checkpoint selection.
  - _target_: autocast.callbacks.checkpoint.ProgressModelCheckpoint
    monitor: val_multiwinkler
    monitor_optional: true
    start_after_fraction: 0.25
    mode: min
    save_top_k: 1
    save_last: false
    filename: "best-multiwinkler-from0p25-{epoch:04d}-{val_multiwinkler:.4f}"
    auto_insert_metric_name: false
  # Optional interval-score checkpoint for later phase (>= 0.50).
  - _target_: autocast.callbacks.checkpoint.ProgressModelCheckpoint
    monitor: val_multiwinkler
    monitor_optional: true
    start_after_fraction: 0.5
    mode: min
    save_top_k: 1
    save_last: false
    filename: "best-multiwinkler-from0p50-{epoch:04d}-{val_multiwinkler:.4f}"
    auto_insert_metric_name: false
  # Optional interval-score checkpoint for very-late phase (>= 0.75).
  - _target_: autocast.callbacks.checkpoint.ProgressModelCheckpoint
    monitor: val_multiwinkler
    monitor_optional: true
    start_after_fraction: 0.75
    mode: min
    save_top_k: 1
    save_last: false
    filename: "best-multiwinkler-from0p75-{epoch:04d}-{val_multiwinkler:.4f}"
    auto_insert_metric_name: false
  # Overall-best interval-score checkpoint with no upper window. The windowed
  # callbacks above can disagree on the global minimum (e.g. pre0p25 wins when
  # multiwinkler peaks early), and 4-decimal filename rounding hides ties — so
  # this one tracks the absolute best across the run for the eval resolver.
  # A small start_after_fraction floor avoids latching onto noisy first epochs.
  - _target_: autocast.callbacks.checkpoint.ProgressModelCheckpoint
    monitor: val_multiwinkler
    monitor_optional: true
    start_after_fraction: 0.05
    mode: min
    save_top_k: 1
    save_last: false
    filename: "best-multiwinkler-overall-{epoch:04d}-{val_multiwinkler:.4f}"
    auto_insert_metric_name: false
  # Plot scalar validation metric histories and custom metric diagnostics
  # such as the MultiCoverage reliability curve at each validation end.
  - _target_: autocast.callbacks.metrics.ValidationMetricPlotCallback
    metric_prefixes: ["val_"]
    dirname: "validation_metrics"
    filename: "validation_metrics.png"
    max_cols: 3
    save_local: true
    log_to_logger: true
    plot_metric_objects: true
  # EMA of model weights. decay=0.999 gives a half-life of ~700 steps,
  # which is a sensible fraction of our shorter runs (FM-ambient ~12k
  # steps) without being wildly reactive on the longest (CRPS-latent
  # ~420k steps).
  # Stored under a dedicated checkpoint key; raw training weights are
  # unaffected.
  - _target_: autocast.callbacks.ema.EMACallback
    decay: 0.999
