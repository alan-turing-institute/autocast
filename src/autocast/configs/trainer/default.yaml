_target_: lightning.pytorch.trainer.trainer.Trainer
max_time: "00:12:00:00" # Hours or datetime string, e.g. "2024-12-31 23:59:59"
accelerator: auto
strategy: auto
num_nodes: 1
devices: 1
log_every_n_steps: 10
enable_checkpointing: true
detect_anomaly: false
default_root_dir: null
gradient_clip_val: null

# Save checkpoints mid-epoch (step-based), not only at epoch end.
# Override at runtime, e.g.: trainer.callbacks.0.every_n_train_steps=500
callbacks:
  - _target_: lightning.pytorch.callbacks.ModelCheckpoint
    save_top_k: 1
    every_n_epochs: 5
    save_on_train_epoch_end: true
    filename: "latest-5ep-{epoch:04d}"
    auto_insert_metric_name: false
  - _target_: lightning.pytorch.callbacks.ModelCheckpoint
    monitor: val_loss
    mode: min
    save_top_k: 1
    filename: "best-val-{epoch:04d}-{val_loss:.4f}"
    auto_insert_metric_name: false

