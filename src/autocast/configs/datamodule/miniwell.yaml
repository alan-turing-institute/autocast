# MiniWell dataset configuration
# TODO: consider datamodule structure here too
# Configure MiniWellDataModule for loading MiniWell h5 datasets
_target_: autocast.data.encoded_dataset.MiniWellDataModule

# Base path containing train/, valid/, test/ subdirectories with *.h5 files
data_path: null

# Temporal configuration
n_steps_input: 1
n_steps_output: 4
stride: 1

# DataLoader configuration
batch_size: 16
num_workers: 8
pin_memory: true
persistent_workers: true
prefetch_factor: 2
