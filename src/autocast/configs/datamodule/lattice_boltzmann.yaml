_target_: autocast.data.datamodule.SpatioTemporalDataModule
data_path: "${oc.env:AUTOCAST_DATASETS,./datasets}/lattice_boltzmann"
batch_size: 16
n_steps_input: 1
n_steps_output: 4
stride: 1
verbose: false
use_normalization: false
normalization_stats:
  # TODO
  stats:
    mean:
      u: 0.0
      v: 0.0
      rho: 0.0
      vorticity: 0.0
    std:
      u: 1.0
      v: 1.0
      rho: 1.0
      vorticity: 1.0
    mean_delta:
      u: 0.0
      v: 0.0
      rho: 0.0
      vorticity: 0.0
    std_delta:
      u: 1.0
      v: 1.0
      rho: 1.0
      vorticity: 1.0
  core_field_names: ["u", "v", "rho", "vorticity"]
  constant_field_names: []
num_workers: 0
