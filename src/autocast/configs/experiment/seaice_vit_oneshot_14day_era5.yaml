# @package _global_
# One-shot 14-day SIC forecast with ViT backbone + identity encoder/decoder.
# Inputs: past 5 days of [SIC, land_mask, ERA5 fields] + cyclic DOY scalars.
# Output: 14-day SIC maps (1 channel).
# No pre-trained AE, no autoregressive unrolling.
defaults:
  - override /datamodule: osisaf_nh_sic_with_era5
  - override /encoder@model.encoder: identity
  - override /decoder@model.decoder: identity
  - override /processor@model.processor: supervised_vit
  - _self_

experiment_name: seaice_vit_oneshot_14day_era5

datamodule:
  batch_size: 4
  data_path: /lus/lfs1aip2/projects/u6eo/qiencai/seaice/processed_osisaf_era5_2000_2020

logging:
  wandb:
    enabled: true

optimizer:
  learning_rate: 0.0001

model:
  train_in_latent_space: false
  loss_func:
    _target_: torch.nn.MSELoss
  # Identity encoder: in_channels = number of input channels (SIC + mask + 11 ERA5 = 13)
  # Channels auto-resolved from data by setup.py
  # Identity decoder: in_channels = SIC-only output = 1
  decoder:
    in_channels: 1
  processor:
    include_global_cond: true   # fuse DOY scalars (sin/cos) into each spatial position
    out_channels: 1             # predict SIC only; matches output_channel_idxs=[0]
    hidden_dim: 512
    num_heads: 8
    n_layers: 12
    drop_path: 0.1
    patch_size: null             # use default hierarchical patch embedding

eval:
  mode: ambient
  batch_indices: [0, 1, 2, 3, 4, 5, 6, 7]
  max_rollout_steps: 1
  compute_rollout_metrics: true
  compute_rollout_coverage: false
  climatology_path: /lus/lfs1aip2/projects/u6eo/qiencai/seaice/processed_osisaf_full/climatology.pt
  benchmark_rollout:
    enabled: false
  save_rollout_snapshots: false

trainer:
  max_epochs: 40
  # limit_train_batches: 1
  # limit_val_batches: 1
