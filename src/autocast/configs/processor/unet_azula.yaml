_target_: autocast.processors.unet.AzulaUNetProcessor
in_channels: null
out_channels: null

# UNet architecture configuration
hid_channels: [64, 128, 256, 512]  # Hidden channels at each level
hid_blocks: [2, 2, 2, 2]  # Number of blocks at each level

# Normalization and regularization
norm: group  # Options: 'batch', 'group', 'layer', 'rms'
groups: 8  # Number of groups for GroupNorm
ffn_factor: 2  # Feed-forward network expansion factor
dropout: 0.0  # Dropout probability

# Boundary conditions
periodic: false  # Use periodic boundary conditions

# Training optimization
gradient_checkpointing: false  # Enable gradient checkpointing to save memory

# Loss function (defaults to MSELoss if not specified)
loss_func: null
