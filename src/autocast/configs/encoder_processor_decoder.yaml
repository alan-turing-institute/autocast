defaults:
  - datamodule: advection_diffusion_multichannel
  - optional simulator: null
  - optimizer: adamw
  - model: encoder_processor_decoder
  - trainer: default
  - logging: wandb
  - optional eval: encoder_processor_decoder
  - _self_
  - optional experiment: null
  - optional local_experiment: null

seed: 42
experiment_name: epd
autoencoder_checkpoint: null
umask: "0002"

# torch.set_float32_matmul_precision: one of {highest, high, medium} or null.
# - null (default): leave PyTorch default ("highest", pure f32 matmul).
# - "high": TF32 matmul with f32 accumulate (~2-3x throughput on Ampere+, safer
#   than bf16-mixed since accumulation stays f32).
# - "medium": TF32 matmul + TF32 accumulate (faster still, less safe).
float32_matmul_precision: null

train_eval:
  checkpoint: null
  eval_subdir: eval
  video_dir: null
  batch_indices: null
  eval_overrides: []

output:
  checkpoint_name: encoder_processor_decoder.ckpt
  checkpoint_path: null  # Override checkpoint path (defaults to work_dir/checkpoint_name)
  save_config: true
  skip_test: false  # Skip running trainer.test() after training

hydra:
  searchpath:
    - file://${oc.env:PWD,.}/local_hydra
  run:
    dir: outputs/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: true
